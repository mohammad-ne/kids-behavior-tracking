<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kids Rewards</title>
<meta name="description" content="Track rewards and penalties for your kids" />
<meta name="theme-color" content="#f9f9f8" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1c1c1a" media="(prefers-color-scheme: dark)" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Kids Rewards" />
<link rel="manifest" id="pwa-manifest" />
<link rel="apple-touch-icon" id="apple-icon" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f9f8;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-em: rgba(0,0,0,0.2);
    --text-primary: #1a1a19;
    --text-secondary: #6b6b68;
    --text-tertiary: #a0a09e;
    --radius-md: 8px;
    --radius-lg: 12px;
    --success-bg: #eaf3de;
    --success-text: #27500a;
    --success-border: rgba(63,109,17,0.3);
    --danger-bg: #fcebeb;
    --danger-text: #791f1f;
    --danger-border: rgba(163,45,45,0.3);
    --info-border: rgba(24,95,165,0.5);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #252523;
      --border: rgba(255,255,255,0.1);
      --border-em: rgba(255,255,255,0.2);
      --text-primary: #f0f0ee;
      --text-secondary: #a0a09e;
      --text-tertiary: #6b6b68;
      --success-bg: #17340a;
      --success-text: #c0dd97;
      --success-border: rgba(144,221,151,0.25);
      --danger-bg: #2a1010;
      --danger-text: #f09595;
      --danger-border: rgba(240,149,149,0.25);
      --info-border: rgba(85,160,230,0.5);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  header {
    max-width: 680px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  header h1 { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  header span { font-size: 13px; color: var(--text-tertiary); }

  .app { max-width: 680px; margin: 0 auto; }

  .tabs { display: flex; gap: 6px; margin-bottom: 1rem; }

  .tab {
    padding: 6px 14px;
    border: 0.5px solid var(--border-em);
    border-radius: var(--radius-md);
    font-size: 13px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-secondary);
    transition: all 0.15s;
    font-family: inherit;
  }

  .tab.active {
    background: var(--bg);
    color: var(--text-primary);
    font-weight: 500;
  }

  .kids-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .kid-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .kid-card.selected { border: 2px solid var(--info-border); }

  .kid-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500; margin-bottom: 8px;
  }

  .kid-name {
    font-size: 14px; font-weight: 500; color: var(--text-primary);
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .kid-points { font-size: 24px; font-weight: 500; color: var(--text-primary); }
  .kid-points-label { font-size: 12px; color: var(--text-secondary); }

  .section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: 12px; color: var(--text-tertiary);
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em;
  }

  input[type="text"], input[type="number"] {
    width: 100%; padding: 7px 10px;
    border: 0.5px solid var(--border-em);
    border-radius: var(--radius-md);
    font-size: 14px; background: var(--bg);
    color: var(--text-primary); font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="number"]:focus { border-color: var(--info-border); }

  .form-row { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
  .form-row input { flex: 1; min-width: 120px; }

  .points-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .points-row input[type="number"] { width: 80px; flex: none; }

  .type-toggle { display: flex; gap: 6px; margin-bottom: 10px; }

  .type-btn {
    padding: 6px 14px; border: 0.5px solid var(--border-em);
    border-radius: var(--radius-md); font-size: 13px; cursor: pointer;
    background: var(--surface); color: var(--text-secondary);
    transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; gap: 5px;
  }

  .type-btn.active-reward { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
  .type-btn.active-penalty { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); }

  .submit-btn {
    padding: 7px 16px; border: 0.5px solid var(--border-em);
    border-radius: var(--radius-md); font-size: 13px; cursor: pointer;
    background: var(--surface); color: var(--text-primary);
    transition: all 0.15s; font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px;
  }

  .submit-btn:hover { background: var(--bg); }
  .submit-btn:active { transform: scale(0.98); }

  /* Presets */
  .presets-section { margin-bottom: 10px; }
  .presets-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .presets-chips { display: flex; flex-wrap: wrap; gap: 6px; }

  .preset-chip {
    padding: 5px 11px; border-radius: var(--radius-md);
    font-size: 12px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 4px;
    transition: all 0.15s; border: 0.5px solid;
  }

  .preset-chip.reward {
    background: var(--success-bg); color: var(--success-text); border-color: var(--success-border);
  }

  .preset-chip.penalty {
    background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border);
  }

  .preset-chip:hover { opacity: 0.8; transform: scale(0.98); }

  /* Presets management */
  .preset-edit {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0; border-bottom: 0.5px solid var(--border);
  }

  .preset-edit:last-child { border-bottom: none; }

  .preset-type-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .dot-reward { background: var(--success-text); }
  .dot-penalty { background: var(--danger-text); }

  .history-list {
    display: flex; flex-direction: column; gap: 8px;
    max-height: 400px; overflow-y: auto;
  }

  .history-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; background: var(--bg);
    border-radius: var(--radius-md); font-size: 13px; flex-wrap: wrap;
  }

  .history-badge {
    font-size: 12px; font-weight: 500; padding: 2px 8px;
    border-radius: var(--radius-md); white-space: nowrap;
  }

  .badge-reward { background: var(--success-bg); color: var(--success-text); }
  .badge-penalty { background: var(--danger-bg); color: var(--danger-text); }

  .history-desc { color: var(--text-secondary); flex: 1; min-width: 100px; }
  .history-time { color: var(--text-tertiary); font-size: 12px; white-space: nowrap; }
  .history-pts { font-weight: 500; }

  .empty-state { color: var(--text-tertiary); font-size: 13px; text-align: center; padding: 1.5rem 0; }

  .manage-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .manage-row input { flex: 1; min-width: 100px; }

  .preset-add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .preset-add-row input[type="text"] { flex: 1; min-width: 100px; }
  .preset-add-row input[type="number"] { width: 70px; flex: none; }

  .seg-control { display: flex; border: 0.5px solid var(--border-em); border-radius: var(--radius-md); overflow: hidden; }
  .seg-btn {
    padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
    background: transparent; border: none; color: var(--text-secondary); transition: all 0.15s;
  }
  .seg-btn.active-reward { background: var(--success-bg); color: var(--success-text); }
  .seg-btn.active-penalty { background: var(--danger-bg); color: var(--danger-text); }

  .kid-edit { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .kid-edit:last-child { border-bottom: none; }

  .mini-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; flex-shrink: 0;
  }

  .del-btn {
    background: none; border: none; cursor: pointer; color: var(--danger-text);
    font-size: 17px; padding: 4px; line-height: 1; border-radius: var(--radius-md);
    display: flex; align-items: center; transition: background 0.15s;
  }

  .del-btn:hover { background: var(--danger-bg); }

  .reset-btn {
    margin-top: 1rem; padding: 6px 14px; border: 0.5px solid var(--danger-border);
    border-radius: var(--radius-md); font-size: 13px; cursor: pointer;
    background: transparent; color: var(--danger-text); font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px; transition: background 0.15s;
  }

  .reset-btn:hover { background: var(--danger-bg); }
  .pts-label { font-size: 13px; color: var(--text-secondary); }

  @media (max-width: 480px) {
    body { padding: 1rem 0.75rem 2rem; }
    .kids-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>Kids Rewards</h1>
  <span>Points tracker</span>
</header>

<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="showTab('track')" id="tab-track">Track</button>
    <button class="tab" onclick="showTab('manage')" id="tab-manage">Kids</button>
    <button class="tab" onclick="showTab('presets')" id="tab-presets">Presets</button>
    <button class="tab" onclick="showTab('history')" id="tab-history">History</button>
  </div>

  <!-- TRACK -->
  <div id="view-track">
    <div class="kids-grid" id="kids-grid"></div>
    <div class="section">
      <div class="section-title" id="selected-label">Select a kid above to log a behavior</div>
      <div id="action-form" style="display:none">

        <div class="presets-section" id="presets-reward-section">
          <div class="presets-label">Quick rewards</div>
          <div class="presets-chips" id="preset-chips-reward"></div>
        </div>

        <div class="presets-section" id="presets-penalty-section">
          <div class="presets-label">Quick penalties</div>
          <div class="presets-chips" id="preset-chips-penalty"></div>
        </div>

        <div style="border-top: 0.5px solid var(--border); padding-top: 12px; margin-top: 4px;">
          <div class="section-title" style="margin-bottom:8px;">Or enter custom</div>
          <div class="type-toggle">
            <button class="type-btn active-reward" id="btn-reward" onclick="setType('reward')">
              <i class="ti ti-plus"></i> Reward
            </button>
            <button class="type-btn" id="btn-penalty" onclick="setType('penalty')">
              <i class="ti ti-minus"></i> Penalty
            </button>
          </div>
          <div class="form-row">
            <input type="text" id="behavior-desc" placeholder="Describe the behavior..." />
          </div>
          <div class="points-row">
            <input type="number" id="points-input" min="1" max="999" value="10" step="1" />
            <span class="pts-label">points</span>
            <button class="submit-btn" onclick="logBehavior()">
              <i class="ti ti-check"></i> Log
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- KIDS -->
  <div id="view-manage" style="display:none">
    <div class="section">
      <div class="section-title">Add a kid</div>
      <div class="manage-row">
        <input type="text" id="new-kid-name" placeholder="Name..." maxlength="20" onkeydown="if(event.key==='Enter')addKid()" />
        <button class="submit-btn" onclick="addKid()"><i class="ti ti-plus"></i> Add</button>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Current kids</div>
      <div id="kids-list"></div>
      <button class="reset-btn" onclick="resetAllPoints()"><i class="ti ti-refresh"></i> Reset all points to 0</button>
    </div>
  </div>

  <!-- PRESETS -->
  <div id="view-presets" style="display:none">
    <div class="section">
      <div class="section-title">Add a preset</div>
      <div class="preset-add-row">
        <input type="text" id="preset-desc" placeholder="Behavior description..." maxlength="60" />
        <input type="number" id="preset-pts" min="1" max="999" value="10" step="1" />
        <div class="seg-control">
          <button class="seg-btn active-reward" id="seg-reward" onclick="setPresetType('reward')">Reward</button>
          <button class="seg-btn" id="seg-penalty" onclick="setPresetType('penalty')">Penalty</button>
        </div>
        <button class="submit-btn" onclick="addPreset()"><i class="ti ti-plus"></i> Add</button>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Reward presets</div>
      <div id="preset-list-reward"></div>
    </div>
    <div class="section">
      <div class="section-title">Penalty presets</div>
      <div id="preset-list-penalty"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="view-history" style="display:none">
    <div class="section">
      <div class="section-title">Recent activity</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { bg: '#dbeafe', text: '#1e40af' },
  { bg: '#dcfce7', text: '#166534' },
  { bg: '#fef9c3', text: '#854d0e' },
  { bg: '#fce7f3', text: '#9d174d' },
];
const COLORS_DARK = [
  { bg: '#1e3a5f', text: '#93c5fd' },
  { bg: '#14532d', text: '#86efac' },
  { bg: '#3f2a00', text: '#fcd34d' },
  { bg: '#500724', text: '#f9a8d4' },
];

function isDark() { return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
function getColor(idx) { return isDark() ? COLORS_DARK[idx % COLORS_DARK.length] : COLORS[idx % COLORS.length]; }

const DEFAULT_PRESETS = [
  { id: 1, desc: 'Did homework', points: 10, type: 'reward' },
  { id: 2, desc: 'Helped with chores', points: 5, type: 'reward' },
  { id: 3, desc: 'Read for 20 mins', points: 10, type: 'reward' },
  { id: 4, desc: 'Kind to sibling', points: 5, type: 'reward' },
  { id: 5, desc: 'Hit or pushed sibling', points: 10, type: 'penalty' },
  { id: 6, desc: 'Didn\'t listen', points: 5, type: 'penalty' },
  { id: 7, desc: 'Threw a tantrum', points: 5, type: 'penalty' },
];

function loadState() {
  try {
    const saved = localStorage.getItem('kids-rewards-state');
    if (saved) {
      const s = JSON.parse(saved);
      if (!s.presets) s.presets = DEFAULT_PRESETS;
      if (!s.presetNextId) s.presetNextId = 100;
      return s;
    }
  } catch(e) {}
  return {
    kids: [
      { id: 1, name: 'Child 1', points: 0, colorIdx: 0 },
      { id: 2, name: 'Child 2', points: 0, colorIdx: 1 },
      { id: 3, name: 'Child 3', points: 0, colorIdx: 2 },
    ],
    history: [],
    presets: DEFAULT_PRESETS,
    nextId: 4,
    presetNextId: 100
  };
}

let state = loadState();
let selected = null;
let actionType = 'reward';
let newPresetType = 'reward';

function saveState() {
  try { localStorage.setItem('kids-rewards-state', JSON.stringify(state)); } catch(e) {}
}

function getInitials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderKidsGrid() {
  const grid = document.getElementById('kids-grid');
  if (!state.kids.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No kids yet — add one in the Kids tab.</div>';
    return;
  }
  grid.innerHTML = state.kids.map(k => {
    const c = getColor(k.colorIdx);
    const sel = selected === k.id ? ' selected' : '';
    return `<div class="kid-card${sel}" onclick="selectKid(${k.id})">
      <div class="kid-avatar" style="background:${c.bg};color:${c.text};">${getInitials(k.name)}</div>
      <div class="kid-name">${escHtml(k.name)}</div>
      <div class="kid-points">${k.points}</div>
      <div class="kid-points-label">points</div>
    </div>`;
  }).join('');
}

function renderPresetChips() {
  const rewards = state.presets.filter(p => p.type === 'reward');
  const penalties = state.presets.filter(p => p.type === 'penalty');

  const rewardSection = document.getElementById('presets-reward-section');
  const penaltySection = document.getElementById('presets-penalty-section');

  rewardSection.style.display = rewards.length ? 'block' : 'none';
  penaltySection.style.display = penalties.length ? 'block' : 'none';

  document.getElementById('preset-chips-reward').innerHTML = rewards.map(p =>
    `<button class="preset-chip reward" onclick="applyPreset(${p.id})">
      <i class="ti ti-plus" style="font-size:11px;"></i> ${escHtml(p.desc)} <span style="opacity:0.7">+${p.points}</span>
    </button>`
  ).join('');

  document.getElementById('preset-chips-penalty').innerHTML = penalties.map(p =>
    `<button class="preset-chip penalty" onclick="applyPreset(${p.id})">
      <i class="ti ti-minus" style="font-size:11px;"></i> ${escHtml(p.desc)} <span style="opacity:0.7">−${p.points}</span>
    </button>`
  ).join('');
}

function renderPresetLists() {
  ['reward','penalty'].forEach(type => {
    const list = document.getElementById('preset-list-' + type);
    const items = state.presets.filter(p => p.type === type);
    if (!items.length) {
      list.innerHTML = '<div class="empty-state">No ' + type + ' presets yet.</div>';
      return;
    }
    list.innerHTML = items.map(p => `
      <div class="preset-edit">
        <div class="preset-type-dot dot-${p.type}"></div>
        <span style="flex:1;font-size:14px;color:var(--text-primary);">${escHtml(p.desc)}</span>
        <span style="font-size:13px;color:var(--text-secondary);margin-right:8px;">${p.points} pts</span>
        <button class="del-btn" onclick="removePreset(${p.id})" aria-label="Remove preset">
          <i class="ti ti-trash"></i>
        </button>
      </div>`).join('');
  });
}

function renderKidsList() {
  const list = document.getElementById('kids-list');
  if (!state.kids.length) { list.innerHTML = '<div class="empty-state">No kids added yet.</div>'; return; }
  list.innerHTML = state.kids.map(k => {
    const c = getColor(k.colorIdx);
    return `<div class="kid-edit">
      <div class="mini-avatar" style="background:${c.bg};color:${c.text};">${getInitials(k.name)}</div>
      <span style="flex:1;font-size:14px;color:var(--text-primary);">${escHtml(k.name)}</span>
      <span style="font-size:13px;color:var(--text-secondary);margin-right:8px;">${k.points} pts</span>
      <button class="del-btn" onclick="removeKid(${k.id})" aria-label="Remove ${escHtml(k.name)}">
        <i class="ti ti-trash"></i>
      </button>
    </div>`;
  }).join('');
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!state.history.length) { list.innerHTML = '<div class="empty-state">No activity yet.</div>'; return; }
  list.innerHTML = [...state.history].reverse().map(h => {
    const sign = h.type === 'reward' ? '+' : '−';
    const cls = h.type === 'reward' ? 'badge-reward' : 'badge-penalty';
    const ptColor = h.type === 'reward' ? 'var(--success-text)' : 'var(--danger-text)';
    return `<div class="history-item">
      <span class="history-badge ${cls}">${escHtml(h.kidName)}</span>
      <span class="history-desc">${escHtml(h.desc)}</span>
      <span class="history-pts" style="color:${ptColor}">${sign}${h.points}</span>
      <span class="history-time">${h.time}</span>
    </div>`;
  }).join('');
}

function render() {
  renderKidsGrid();
  renderPresetChips();
  renderPresetLists();
  renderKidsList();
  renderHistory();
}

function selectKid(id) {
  selected = id;
  const kid = state.kids.find(k => k.id === id);
  document.getElementById('selected-label').textContent = `Logging for ${kid.name}`;
  document.getElementById('action-form').style.display = 'block';
  renderKidsGrid();
}

function setType(type) {
  actionType = type;
  document.getElementById('btn-reward').className = 'type-btn' + (type === 'reward' ? ' active-reward' : '');
  document.getElementById('btn-penalty').className = 'type-btn' + (type === 'penalty' ? ' active-penalty' : '');
}

function setPresetType(type) {
  newPresetType = type;
  document.getElementById('seg-reward').className = 'seg-btn' + (type === 'reward' ? ' active-reward' : '');
  document.getElementById('seg-penalty').className = 'seg-btn' + (type === 'penalty' ? ' active-penalty' : '');
}

function applyPreset(id) {
  if (!selected) return;
  const preset = state.presets.find(p => p.id === id);
  if (!preset) return;
  const kid = state.kids.find(k => k.id === selected);
  if (!kid) return;
  if (preset.type === 'reward') kid.points += preset.points;
  else kid.points = Math.max(0, kid.points - preset.points);
  const now = new Date();
  const time = now.toLocaleDateString([], {month:'short',day:'numeric'}) + ' ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  state.history.push({ kidName: kid.name, desc: preset.desc, points: preset.points, type: preset.type, time });
  saveState();
  render();
}

function logBehavior() {
  if (!selected) return;
  const desc = document.getElementById('behavior-desc').value.trim();
  const pts = Math.max(1, parseInt(document.getElementById('points-input').value) || 10);
  if (!desc) { document.getElementById('behavior-desc').focus(); return; }
  const kid = state.kids.find(k => k.id === selected);
  if (!kid) return;
  if (actionType === 'reward') kid.points += pts;
  else kid.points = Math.max(0, kid.points - pts);
  const now = new Date();
  const time = now.toLocaleDateString([], {month:'short',day:'numeric'}) + ' ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  state.history.push({ kidName: kid.name, desc, points: pts, type: actionType, time });
  document.getElementById('behavior-desc').value = '';
  saveState();
  render();
}

function addPreset() {
  const desc = document.getElementById('preset-desc').value.trim();
  const pts = Math.max(1, parseInt(document.getElementById('preset-pts').value) || 10);
  if (!desc) { document.getElementById('preset-desc').focus(); return; }
  state.presets.push({ id: state.presetNextId++, desc, points: pts, type: newPresetType });
  document.getElementById('preset-desc').value = '';
  saveState();
  render();
}

function removePreset(id) {
  state.presets = state.presets.filter(p => p.id !== id);
  saveState();
  render();
}

function addKid() {
  const input = document.getElementById('new-kid-name');
  const name = input.value.trim();
  if (!name) return;
  state.kids.push({ id: state.nextId++, name, points: 0, colorIdx: state.kids.length % COLORS.length });
  input.value = '';
  saveState();
  render();
}

function removeKid(id) {
  if (selected === id) {
    selected = null;
    document.getElementById('action-form').style.display = 'none';
    document.getElementById('selected-label').textContent = 'Select a kid above to log a behavior';
  }
  state.kids = state.kids.filter(k => k.id !== id);
  saveState();
  render();
}

function resetAllPoints() {
  if (!confirm('Reset all points to 0?')) return;
  state.kids.forEach(k => k.points = 0);
  saveState();
  render();
}

function showTab(tab) {
  ['track','manage','presets','history'].forEach(t => {
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).className = 'tab' + (t === tab ? ' active' : '');
  });
}

document.getElementById('behavior-desc').addEventListener('keydown', e => {
  if (e.key === 'Enter') logBehavior();
});

document.getElementById('preset-desc').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPreset();
});

render();

// PWA: inject manifest and icon as inline blobs (works from local file)
(function() {
  const icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <rect width="192" height="192" rx="40" fill="#4ade80"/>
    <text x="96" y="130" font-size="100" text-anchor="middle" font-family="sans-serif">⭐</text>
  </svg>`;
  const iconBlob = new Blob([icon], {type:'image/svg+xml'});
  const iconUrl = URL.createObjectURL(iconBlob);
  document.getElementById('apple-icon').href = iconUrl;

  const manifest = {
    name: 'Kids Rewards Tracker',
    short_name: 'Kids Rewards',
    description: 'Track rewards and penalties for your kids',
    start_url: '.',
    display: 'standalone',
    background_color: '#f9f9f8',
    theme_color: '#f9f9f8',
    orientation: 'portrait',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
      { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);
})();

// Service worker for offline support
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'kids-rewards-v1';
const URLS = [
  'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css',
  'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/fonts/tabler-icons.woff2'
];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS).catch(()=>{})));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>new Response('', {status:503}))));
});`;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: '/'}).catch(() => {
    navigator.serviceWorker.register(swUrl);
  });
}
</script>
</body>
